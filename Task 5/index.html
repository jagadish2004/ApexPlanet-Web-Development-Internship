<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Commerce Website</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<h1>🛍 My Shopping Store</h1>

<input
type="text"
id="search"
placeholder="Search Product..."
onkeyup="searchProduct()">

</header>

<h2>Products</h2>

<div id="products" class="product-container">

<div class="product">

<img src="https://picsum.photos/200?1">

<h3>Laptop</h3>

<p>₹50000</p>

<button onclick="addCart('Laptop',50000)">
Add to Cart
</button>

</div>

<div class="product">

<img src="https://picsum.photos/200?2">

<h3>Mobile</h3>

<p>₹20000</p>

<button onclick="addCart('Mobile',20000)">
Add to Cart
</button>

</div>

<div class="product">

<img src="https://picsum.photos/200?3">

<h3>Headphones</h3>

<p>₹2000</p>

<button onclick="addCart('Headphones',2000)">
Add to Cart
</button>

</div>

<div class="product">

<img src="https://picsum.photos/200?4">

<h3>Smart Watch</h3>

<p>₹3500</p>

<button onclick="addCart('Smart Watch',3500)">
Add to Cart
</button>

</div>

<div class="product">

<img src="https://picsum.photos/200?5">

<h3>Keyboard</h3>

<p>₹1200</p>

<button onclick="addCart('Keyboard',1200)">
Add to Cart
</button>

</div>

<div class="product">

<img src="https://picsum.photos/200?6">

<h3>Mouse</h3>

<p>₹800</p>

<button onclick="addCart('Mouse',800)">
Add to Cart
</button>

</div>

</div>

<hr>

<h2>🛒 Shopping Cart</h2>

<ul id="cart"></ul>

<h2>Total : ₹<span id="total">0</span></h2>

<button onclick="checkout()">

Checkout

</button>

<script src="script.js"></script>

</body>
</html>
